services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: smith
      MINIO_ROOT_PASSWORD: smithsmith
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - agent_smith_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - ./minio-cors.json:/config/minio-cors.json:ro
    command:
      - >-
        mc alias set local http://minio:9000 smith smithsmith &&
        mc mb --ignore-existing local/agent-smith &&
        mc anonymous set none local/agent-smith &&
        mc cors set local/agent-smith /config/minio-cors.json

volumes:
  agent_smith_minio_data:
