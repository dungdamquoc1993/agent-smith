<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Smith Test App</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d12;
        --panel: #11151d;
        --panel-2: #151a24;
        --panel-3: #1b2230;
        --ink: #edf2f7;
        --muted: #9aa7b8;
        --line: #2a3343;
        --accent: #14b8a6;
        --accent-soft: rgba(20, 184, 166, 0.14);
        --user: #1d4ed8;
        --tool: #273244;
        --danger: #fb7185;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font: 14px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--ink);
        border-radius: 7px;
        padding: 8px 10px;
        cursor: pointer;
      }

      button:hover {
        border-color: #3b4658;
        background: var(--panel-3);
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #041312;
        font-weight: 700;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .app {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr) 300px;
        height: 100vh;
        min-height: 680px;
      }

      .sidebar,
      .debug {
        min-height: 0;
        background: var(--panel);
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
      }

      .debug {
        border-right: 0;
        border-left: 1px solid var(--line);
      }

      .brand,
      .debug header,
      .chat-header {
        height: 58px;
        flex: 0 0 auto;
        border-bottom: 1px solid var(--line);
        padding: 0 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      h1,
      h2 {
        margin: 0;
        font-size: 15px;
      }

      .status {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel-2);
        color: var(--muted);
        padding: 4px 8px;
        font-size: 12px;
        white-space: nowrap;
      }

      .status.ok {
        border-color: rgba(20, 184, 166, 0.4);
        color: var(--accent);
        background: var(--accent-soft);
      }

      .status.error {
        border-color: rgba(251, 113, 133, 0.45);
        color: var(--danger);
      }

      .sidebar-body,
      .debug-body {
        min-height: 0;
        overflow: auto;
        padding: 12px;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .row > * {
        min-width: 0;
      }

      .meta {
        color: var(--muted);
        font-size: 12px;
      }

      .section-title {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .info-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        padding: 10px;
        display: grid;
        gap: 4px;
      }

      .info-card strong {
        font-size: 13px;
      }

      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0e1219;
        color: var(--ink);
        padding: 10px;
        outline: none;
      }

      select:focus,
      textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.16);
      }

      .chat-shell {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        background: #0d1017;
      }

      .messages {
        min-height: 0;
        overflow: auto;
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .empty {
        margin: auto;
        max-width: 460px;
        text-align: center;
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 10px;
        padding: 22px;
      }

      .turn {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        max-width: 860px;
      }

      .turn.user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }

      .turn.assistant,
      .turn.tool,
      .turn.system {
        align-self: flex-start;
      }

      .avatar {
        width: 28px;
        height: 28px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        border: 1px solid var(--line);
        background: var(--panel-3);
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .user .avatar {
        border-color: rgba(96, 165, 250, 0.5);
        background: var(--user);
        color: white;
      }

      .assistant .avatar {
        border-color: rgba(20, 184, 166, 0.5);
        background: var(--accent-soft);
        color: var(--accent);
      }

      .bubble {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel-2);
        padding: 11px 12px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .user .bubble {
        border-color: rgba(96, 165, 250, 0.42);
        background: #173a7a;
      }

      .tool .bubble,
      .system .bubble {
        color: var(--muted);
        background: var(--tool);
        font-size: 12px;
        padding: 8px 10px;
      }

      .system.error .bubble {
        border-color: rgba(251, 113, 133, 0.45);
        color: var(--danger);
      }

      .turn.error .bubble {
        border-color: rgba(251, 113, 133, 0.55);
        color: var(--danger);
      }

      .label {
        display: block;
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .composer {
        flex: 0 0 auto;
        border-top: 1px solid var(--line);
        padding: 14px;
        background: var(--panel);
        display: grid;
        gap: 10px;
      }

      textarea {
        min-height: 82px;
        max-height: 220px;
        resize: vertical;
      }

      .debug-line {
        border-bottom: 1px solid var(--line);
        padding: 8px 0;
        color: var(--muted);
        font-size: 12px;
      }

      .debug-line strong {
        color: var(--ink);
      }

      @media (max-width: 1120px) {
        .app {
          grid-template-columns: 240px minmax(0, 1fr);
        }

        .debug {
          display: none;
        }
      }

      @media (max-width: 760px) {
        .app {
          grid-template-columns: 1fr;
          height: auto;
          min-height: 100vh;
        }

        .sidebar {
          display: none;
        }

        .chat-shell {
          min-height: 100vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>Agent Smith</h1>
          <span id="dbStatus" class="status">Booting</span>
        </div>
        <div class="sidebar-body stack">
          <div class="stack">
            <div class="section-title">Principal</div>
            <div class="info-card">
              <strong id="principalName">Test Principal</strong>
              <span class="meta" id="principalId">...</span>
            </div>
          </div>

          <div class="stack">
            <div class="section-title">Session</div>
            <select id="sessionSelect"></select>
            <div class="row">
              <button id="newSessionBtn">New</button>
              <button id="reloadSessionBtn">Reload</button>
            </div>
          </div>

          <div class="stack">
            <div class="section-title">Agent Resource</div>
            <div class="info-card">
              <strong id="agentName">test_assistant</strong>
              <span class="meta" id="resourceSummary">No resource loaded</span>
            </div>
            <div class="row">
              <button id="seedBtn">Seed</button>
              <button id="reloadResourcesBtn">Refresh</button>
            </div>
          </div>
        </div>
      </aside>

      <section class="chat-shell">
        <div class="chat-header">
          <div>
            <h2>Chat</h2>
            <div class="meta" id="activeSessionLabel">No session yet</div>
          </div>
          <span id="chatStatus" class="status">Idle</span>
        </div>

        <div id="chat" class="messages">
          <div class="empty" id="emptyState">
            Start a prompt to test the persisted session, assistant messages, and tool events.
          </div>
        </div>

        <form id="promptForm" class="composer">
          <textarea id="promptInput" placeholder="Message test_assistant..."></textarea>
          <div class="row">
            <button class="primary" id="sendBtn" type="submit">Send</button>
            <span class="meta">Tool calls and tool results render inline as compact steps.</span>
          </div>
        </form>
      </section>

      <aside class="debug">
        <header>
          <h2>Debug Events</h2>
          <button id="clearEventsBtn">Clear</button>
        </header>
        <div class="debug-body" id="eventLog"></div>
      </aside>
    </main>

    <script>
      const state = {
        principal: null,
        sessions: [],
        resources: [],
        activeSessionId: null,
        defaults: { agentName: "test_assistant" },
        busy: false,
        liveAssistant: null,
        liveAssistantText: "",
        pendingUserPrompt: "",
        sawAssistantEnd: false,
      };

      const $ = (id) => document.getElementById(id);

      function setStatus(id, text, mode = "") {
        const el = $(id);
        el.textContent = text;
        el.classList.toggle("ok", mode === "ok");
        el.classList.toggle("error", mode === "error");
      }

      function shortId(id) {
        return id ? String(id).slice(0, 8) : "";
      }

      function shortJson(value, max = 180) {
        const text = JSON.stringify(value ?? {}, null, 0);
        return text.length > max ? `${text.slice(0, max - 1)}...` : text;
      }

      function messageText(message) {
        if (!message) return "";
        if (message.role === "assistant" && message.errorMessage) {
          return "Model error. Check the server log for details.";
        }
        if (typeof message.content === "string") return message.content;
        if (!Array.isArray(message.content)) return "";
        const text = message.content
          .map((part) => {
            if (typeof part === "string") return part;
            if (part && typeof part.text === "string") return part.text;
            if (part && typeof part.thinking === "string") return "";
            return "";
          })
          .filter(Boolean)
          .join("\n");
        if (text) return text;
        if (message.role === "assistant" && message.stopReason && message.stopReason !== "stop") {
          return `Assistant stopped: ${message.stopReason}`;
        }
        return "";
      }

      function isAssistantError(message) {
        return Boolean(
          message &&
            message.role === "assistant" &&
            (message.errorMessage || ["error", "aborted"].includes(message.stopReason))
        );
      }

      function toolCallsFromMessage(message) {
        if (!message || !Array.isArray(message.content)) return [];
        return message.content.filter((part) => part && part.type === "toolCall");
      }

      function clearChat() {
        $("chat").innerHTML = "";
      }

      function showEmptyIfNeeded() {
        if (!$("chat").children.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.id = "emptyState";
          empty.textContent = "Start a prompt to test the persisted session, assistant messages, and tool events.";
          $("chat").appendChild(empty);
        }
      }

      function removeEmpty() {
        const empty = $("emptyState");
        if (empty) empty.remove();
      }

      function scrollChat() {
        $("chat").scrollTop = $("chat").scrollHeight;
      }

      function appendTurn(role, text, options = {}) {
        removeEmpty();
        const turn = document.createElement("div");
        turn.className = `turn ${role}${options.error ? " error" : ""}`;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = options.avatar || (role === "user" ? "U" : role === "assistant" ? "AI" : "T");

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        if (options.label) {
          const label = document.createElement("span");
          label.className = "label";
          label.textContent = options.label;
          bubble.appendChild(label);
        }
        const content = document.createElement("span");
        content.className = "content";
        content.textContent = text || "";
        bubble.appendChild(content);

        turn.appendChild(avatar);
        turn.appendChild(bubble);
        $("chat").appendChild(turn);
        scrollChat();
        return { turn, content };
      }

      function appendMessage(message, options = {}) {
        if (!message) return;
        if (message.role === "toolResult") {
          appendToolResult(message.toolName, message.content, message.isError);
          return;
        }
        if (message.role === "assistant") {
          const text = messageText(message);
          if (text) appendTurn("assistant", text, { label: "Assistant", error: isAssistantError(message) });
          for (const call of toolCallsFromMessage(message)) {
            appendToolCall(call.name, call.arguments);
          }
          return;
        }
        appendTurn(message.role || "system", messageText(message), {
          label: message.role === "user" ? "You" : message.role || "Message",
        });
      }

      function ensureLiveAssistant() {
        if (!state.liveAssistant) {
          state.liveAssistant = appendTurn("assistant", "", { label: "Assistant" });
          state.liveAssistantText = "";
        }
        return state.liveAssistant;
      }

      function appendAssistantDelta(delta) {
        if (!delta) return;
        const live = ensureLiveAssistant();
        state.liveAssistantText += delta;
        live.content.textContent = state.liveAssistantText;
        scrollChat();
      }

      function finalizeAssistant(message) {
        const text = messageText(message);
        if (state.liveAssistant) {
          state.liveAssistant.content.textContent = text || state.liveAssistantText || "(empty)";
          state.liveAssistant.turn.classList.toggle("error", isAssistantError(message));
        } else if (text) {
          appendTurn("assistant", text, { label: "Assistant", error: isAssistantError(message) });
        }
        if (isAssistantError(message)) setStatus("chatStatus", "Model error", "error");
        state.liveAssistant = null;
        state.liveAssistantText = "";
        state.sawAssistantEnd = true;
      }

      function appendToolCall(name, input) {
        appendTurn("tool", `Call ${name || "tool"} ${shortJson(input)}`, {
          label: "Tool call",
          avatar: "TC",
        });
      }

      function appendToolResult(name, content, isError = false) {
        const text = Array.isArray(content)
          ? content.map((part) => part.text || `[${part.type || "content"}]`).join(" ")
          : "";
        appendTurn("tool", `${isError ? "Failed" : "Result"} ${name || "tool"}${text ? `: ${text}` : ""}`, {
          label: "Tool result",
          avatar: "TR",
          error: Boolean(isError),
        });
      }

      function appendSystem(text, isError = false) {
        appendTurn("system", text, { label: "System", avatar: "S", error: isError });
      }

      function logEvent(name, data) {
        const log = $("eventLog");
        const line = document.createElement("div");
        line.className = "debug-line";
        const type = data && data.type ? data.type : name;
        line.innerHTML = `<strong>${type}</strong><br><span>${new Date().toLocaleTimeString()}</span>`;
        log.prepend(line);
        while (log.children.length > 80) log.lastChild.remove();
      }

      function renderSidebar() {
        $("principalName").textContent = state.principal?.displayName || "Test Principal";
        $("principalId").textContent = state.principal?.id || "...";
        $("agentName").textContent = state.defaults.agentName || "test_assistant";

        const agent = state.resources.find((resource) => resource.name === state.defaults.agentName);
        $("resourceSummary").textContent = agent
          ? `${agent.kind} v${agent.currentVersion?.version || 1}`
          : "Click Seed to create test_assistant";

        const select = $("sessionSelect");
        select.innerHTML = "";
        for (const session of state.sessions) {
          const option = document.createElement("option");
          option.value = session.id;
          option.textContent = `${session.title || "Untitled"} · ${shortId(session.id)}`;
          select.appendChild(option);
        }
        if (state.activeSessionId) select.value = state.activeSessionId;
        $("activeSessionLabel").textContent = state.activeSessionId
          ? `Session ${shortId(state.activeSessionId)}`
          : "No session yet";
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { "content-type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error((data.error && data.error.message) || response.statusText);
        }
        return data;
      }

      async function bootstrap() {
        setStatus("dbStatus", "Booting");
        const data = await api("/api/bootstrap");
        state.principal = data.principal;
        state.sessions = data.sessions || [];
        state.resources = data.resources || [];
        state.defaults = data.defaults || state.defaults;
        state.activeSessionId = state.sessions[0]?.id || null;
        setStatus("dbStatus", "DB ok", "ok");
        renderSidebar();
        if (state.activeSessionId) await loadEntries(state.activeSessionId);
      }

      async function refreshSessions() {
        const data = await api("/api/sessions");
        state.sessions = data.sessions || [];
        if (!state.activeSessionId && state.sessions[0]) state.activeSessionId = state.sessions[0].id;
        renderSidebar();
      }

      async function refreshResources() {
        const data = await api("/api/resources");
        state.resources = data.resources || [];
        renderSidebar();
      }

      async function newSession() {
        const session = await api("/api/sessions", {
          method: "POST",
          body: JSON.stringify({ title: "Test chat" }),
        });
        state.activeSessionId = session.id;
        await refreshSessions();
        clearChat();
        showEmptyIfNeeded();
      }

      async function loadEntries(sessionId) {
        if (!sessionId) return;
        const data = await api(`/api/sessions/${sessionId}/entries`);
        clearChat();
        for (const entry of data.entries || []) {
          if (entry.type === "message" && entry.message) appendMessage(entry.message);
        }
        showEmptyIfNeeded();
      }

      async function seedResources() {
        const data = await api("/api/resources/seed", { method: "POST", body: "{}" });
        logEvent("seed", data);
        await refreshResources();
      }

      function parseSseChunk(buffer, onEvent) {
        let index;
        while ((index = buffer.indexOf("\n\n")) >= 0) {
          const raw = buffer.slice(0, index);
          buffer = buffer.slice(index + 2);
          let name = "message";
          let data = "";
          for (const line of raw.split("\n")) {
            if (line.startsWith("event:")) name = line.slice(6).trim();
            if (line.startsWith("data:")) data += line.slice(5).trim();
          }
          if (data) onEvent(name, JSON.parse(data));
        }
        return buffer;
      }

      function handleHarnessEvent(event) {
        if (!event || !event.type) return;
        if (event.type === "message_start" && event.message?.role === "assistant") {
          ensureLiveAssistant();
          return;
        }
        if (event.type === "message_update") {
          const assistantEvent = event.assistantMessageEvent;
          if (assistantEvent?.type === "text_delta") appendAssistantDelta(assistantEvent.delta);
          if (assistantEvent?.type === "text_start") ensureLiveAssistant();
          return;
        }
        if (event.type === "message_end") {
          const message = event.message;
          if (message?.role === "assistant") finalizeAssistant(message);
          return;
        }
        if (event.type === "tool_call") {
          appendToolCall(event.toolName, event.input);
          return;
        }
        if (event.type === "tool_result") {
          appendToolResult(event.toolName, event.content, event.isError);
        }
      }

      async function sendPrompt(prompt) {
        state.busy = true;
        state.pendingUserPrompt = prompt;
        state.sawAssistantEnd = false;
        $("sendBtn").disabled = true;
        setStatus("chatStatus", "Running", "ok");
        appendTurn("user", prompt, { label: "You" });

        const response = await fetch("/api/prompt/stream", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            prompt,
            sessionId: state.activeSessionId,
            agentName: state.defaults.agentName,
          }),
        });
        if (!response.ok || !response.body) {
          const data = await response.json().catch(() => ({}));
          throw new Error((data.error && data.error.message) || response.statusText);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          buffer = parseSseChunk(buffer, (name, data) => {
            logEvent(name, data);
            if (name === "session" && data.id) {
              state.activeSessionId = data.id;
              renderSidebar();
            } else if (name === "harness") {
              handleHarnessEvent(data);
            } else if (name === "done") {
              if (!state.sawAssistantEnd) appendMessage(data.message);
              if (isAssistantError(data.message)) setStatus("chatStatus", "Model error", "error");
              if (data.session?.id) state.activeSessionId = data.session.id;
            } else if (name === "error") {
              appendSystem(data.message || "Prompt failed", true);
              setStatus("chatStatus", "Error", "error");
            }
          });
        }
        await refreshSessions();
        if (!$("chatStatus").classList.contains("error")) setStatus("chatStatus", "Idle");
      }

      $("newSessionBtn").addEventListener("click", () => newSession().catch((err) => setStatus("dbStatus", err.message, "error")));
      $("reloadSessionBtn").addEventListener("click", () => refreshSessions().catch((err) => setStatus("dbStatus", err.message, "error")));
      $("reloadResourcesBtn").addEventListener("click", () => refreshResources().catch((err) => setStatus("dbStatus", err.message, "error")));
      $("seedBtn").addEventListener("click", () => seedResources().catch((err) => setStatus("dbStatus", err.message, "error")));
      $("clearEventsBtn").addEventListener("click", () => {
        $("eventLog").innerHTML = "";
      });
      $("sessionSelect").addEventListener("change", async (event) => {
        state.activeSessionId = event.target.value;
        renderSidebar();
        await loadEntries(state.activeSessionId);
      });
      $("promptForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const prompt = $("promptInput").value.trim();
        if (!prompt || state.busy) return;
        $("promptInput").value = "";
        try {
          await sendPrompt(prompt);
        } catch (err) {
          appendSystem(err.message, true);
          setStatus("chatStatus", "Error", "error");
          logEvent("client_error", { type: "client_error", message: err.message });
        } finally {
          state.busy = false;
          state.liveAssistant = null;
          state.liveAssistantText = "";
          $("sendBtn").disabled = false;
          if (!$("chatStatus").classList.contains("error")) setStatus("chatStatus", "Idle");
        }
      });

      bootstrap().catch((err) => {
        setStatus("dbStatus", err.message, "error");
        appendSystem(err.message, true);
        logEvent("bootstrap_error", { type: "bootstrap_error", message: err.message });
      });
    </script>
  </body>
</html>
